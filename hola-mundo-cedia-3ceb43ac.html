<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<style>

:root {
  /* Brand */
  --cedia-primary:  #020029;
  --cedia-accent:   #29c6ff;
  --cedia-blue-1:   #0c0c43;
  --cedia-blue-2:   #16207a;
  --cedia-blue-3:   #1f2bb0;
  --cedia-blue-4:   #273dd5;
  --cedia-surface:  #e2e3d5;

  /* Semantic text */
  --color-text-primary:   #020029;
  --color-text-secondary: #334155;
  --color-text-tertiary:  #64748B;
  --color-text-info:      #29C6FF;
  --color-text-success:   #1D9E75;
  --color-text-warning:   #C58A00;
  --color-text-danger:    #C24141;

  /* Semantic backgrounds */
  --color-bg-primary:   #FFFFFF;
  --color-bg-secondary: #F4F7FB;
  --color-bg-tertiary:  #E2E3D5;

  /* Semantic borders */
  --color-border-tertiary:  rgba(2,0,41,0.12);
  --color-border-secondary: rgba(2,0,41,0.22);
  --color-border-primary:   rgba(2,0,41,0.32);

  /* Typography */
  --font-sans: "Gotham", "Montserrat", "Arial", sans-serif;
  --font-mono: "SF Mono", Menlo, Consolas, monospace;

  /* Radii */
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;

  /* Color ramps (fill / stroke / heading / secondary text) */
  --ramp-purple-fill: #EEF0FF; --ramp-purple-stroke: #273DD5;
  --ramp-purple-th:   #18288F; --ramp-purple-ts:     #273DD5;

  --ramp-teal-fill:   #E7FAFF; --ramp-teal-stroke:   #29C6FF;
  --ramp-teal-th:     #0C7FA6; --ramp-teal-ts:       #169FCC;

  --ramp-coral-fill:  #FFF1ED; --ramp-coral-stroke:  #D86A43;
  --ramp-coral-th:    #9F4323; --ramp-coral-ts:      #B85732;

  --ramp-pink-fill:   #FDF0F7; --ramp-pink-stroke:   #C85A93;
  --ramp-pink-th:     #8F3265; --ramp-pink-ts:       #A94478;

  --ramp-gray-fill:   #F3F5F7; --ramp-gray-stroke:   #7B8794;
  --ramp-gray-th:     #475569; --ramp-gray-ts:       #64748B;

  --ramp-blue-fill:   #EAF0FF; --ramp-blue-stroke:   #0C0C43;
  --ramp-blue-th:     #020029; --ramp-blue-ts:       #1B256B;

  --ramp-green-fill:  #EAF8F2; --ramp-green-stroke:  #1D9E75;
  --ramp-green-th:    #116B4F; --ramp-green-ts:      #17815F;

  --ramp-amber-fill:  #FFF7E8; --ramp-amber-stroke:  #C58A00;
  --ramp-amber-th:    #8A6100; --ramp-amber-ts:      #A87400;

  --ramp-red-fill:    #FDEEEE; --ramp-red-stroke:    #C24141;
  --ramp-red-th:      #8F2D2D; --ramp-red-ts:        #A73737;
}

  --cedia-primary:  #F5F7FA;

  --color-bg-secondary: #0C0C43;
  --color-bg-tertiary:  #111A52;

  --color-border-tertiary:  rgba(255,255,255,0.12);
  --color-border-secondary: rgba(255,255,255,0.22);
  --color-border-primary:   rgba(255,255,255,0.32);

  --ramp-purple-fill: #18288F; --ramp-purple-stroke: #7F92FF;
  --ramp-purple-th:   #D9E0FF; --ramp-purple-ts:     #AEBBFF;

  --ramp-teal-fill:   #0A4D63; --ramp-teal-stroke:   #63D8FF;
  --ramp-teal-th:     #D7F7FF; --ramp-teal-ts:       #9BE8FF;

  --ramp-coral-fill:  #6D331F; --ramp-coral-stroke:  #F29A7A;
  --ramp-coral-th:    #FFE0D4; --ramp-coral-ts:      #FFC2AE;

  --ramp-pink-fill:   #6E2A4D; --ramp-pink-stroke:   #F09CC7;
  --ramp-pink-th:     #FFE1EF; --ramp-pink-ts:       #F7BDD9;

  --ramp-gray-fill:   #334155; --ramp-gray-stroke:   #A8B3C2;
  --ramp-gray-th:     #F1F5F9; --ramp-gray-ts:       #D5DCE5;

  --ramp-blue-fill:   #111A52; --ramp-blue-stroke:   #7EA2FF;
  --ramp-blue-th:     #EEF2FF; --ramp-blue-ts:       #C6D4FF;

  --ramp-green-fill:  #0F4F3D; --ramp-green-stroke:  #52C69A;
  --ramp-green-th:    #DCFCEF; --ramp-green-ts:      #B7F1DA;

  --ramp-amber-fill:  #5F4500; --ramp-amber-stroke:  #E9B949;
  --ramp-amber-th:    #FFF1C7; --ramp-amber-ts:      #FFD978;

  --ramp-red-fill:    #6B2424; --ramp-red-stroke:    #F07C7C;
  --ramp-red-th:      #FFE1E1; --ramp-red-ts:        #FFC1C1;
}

.c-blue   > rect, .c-blue   > circle, .c-blue   > ellipse { fill: var(--ramp-blue-fill);   stroke: var(--ramp-blue-stroke);   stroke-width: .5; }
.c-blue   > .th { fill: var(--ramp-blue-th)   !important; } .c-blue   > .ts { fill: var(--ramp-blue-ts)   !important; }
.c-green  > rect, .c-green  > circle, .c-green  > ellipse { fill: var(--ramp-green-fill);  stroke: var(--ramp-green-stroke);  stroke-width: .5; }
.c-green  > .th { fill: var(--ramp-green-th)  !important; } .c-green  > .ts { fill: var(--ramp-green-ts)  !important; }
.c-amber  > rect, .c-amber  > circle, .c-amber  > ellipse { fill: var(--ramp-amber-fill);  stroke: var(--ramp-amber-stroke);  stroke-width: .5; }

.c-red    > rect, .c-red    > circle, .c-red    > ellipse { fill: var(--ramp-red-fill);    stroke: var(--ramp-red-stroke);    stroke-width: .5; }
.c-red    > .th { fill: var(--ramp-red-th)    !important; } .c-red    > .ts { fill: var(--ramp-red-ts)    !important; }


* { box-sizing: border-box; margin: 0; font-family: var(--font-sans); }
html, body { overflow: hidden; }
body {
  background: transparent;
  color: var(--color-text-primary);
  line-height: 1.5;
  padding: 10px;
}
svg { overflow: visible; }
svg text { fill: var(--color-text-primary); }

h1 { font-size: 22px; font-weight: 600; color: var(--cedia-primary); margin-bottom: 12px; }
h2 { font-size: 18px; font-weight: 500; color: var(--cedia-primary); margin-bottom: 8px; }
h3 { font-size: 16px; font-weight: 500; color: var(--cedia-primary); margin-bottom: 6px; }
p  { font-size: 14px; color: var(--color-text-secondary); margin-bottom: 8px; }

button {
  background: var(--color-bg-secondary);
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--radius-md);
  padding: 6px 14px;
  font-size: 13px;
  color: var(--color-text-primary);
  cursor: pointer;
  font-family: var(--font-sans);
  transition: background 0.15s;
}
button:hover  { background: var(--color-bg-tertiary); }
button.active { background: var(--cedia-accent); color: var(--cedia-primary); border-color: var(--cedia-accent); }

input[type="range"] {
  -webkit-appearance: none;
  width: 100%; height: 4px;
  background: var(--color-border-tertiary);
  border-radius: 2px; outline: none;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--cedia-accent);
  border: 0.5px solid var(--color-border-secondary);
  cursor: pointer;
}

select {
  background: var(--color-bg-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--radius-md);
  padding: 6px 10px; font-size: 13px;
  color: var(--color-text-primary);
  font-family: var(--font-sans);
}

code {
  font-family: var(--font-mono); font-size: 13px;
  background: var(--color-bg-tertiary);
  padding: 2px 6px; border-radius: 4px;
}

/* KPI card — reusable component */
.kpi-card {
  background: var(--color-bg-secondary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
}
.kpi-value { font-size: 28px; font-weight: 700; color: var(--cedia-primary); }
.kpi-label { font-size: 12px; color: var(--color-text-tertiary); margin-top: 2px; }
.kpi-accent { color: var(--cedia-accent); }

</style>
<script>
(function() {
  function detectTheme(root) {
    return root.classList.contains('dark')
      || root.getAttribute('data-theme') === 'dark'
      || getComputedStyle(root).colorScheme === 'dark';
  }

  function applyTheme(isDark) {
    var theme = isDark ? 'dark' : 'light';
    if (document.documentElement.getAttribute('data-theme') === theme) return;
    document.documentElement.setAttribute('data-theme', theme);

    /* Hot-update Chart.js if already initialised */
    if (window.Chart && Chart.instances) {
      var s  = getComputedStyle(document.documentElement);
      var tc = s.getPropertyValue('--color-text-secondary').trim();
      var gc = s.getPropertyValue('--color-border-tertiary').trim();
      Chart.defaults.color       = tc;
      Chart.defaults.borderColor = gc;
      Object.values(Chart.instances).forEach(function(chart) {
        Object.values(chart.options.scales || {}).forEach(function(scale) {
          if (scale.ticks) scale.ticks.color = tc;
          if (scale.grid)  scale.grid.color  = gc;
        });
        var leg = (chart.options.plugins || {}).legend;
        if (leg && leg.labels) leg.labels.color = tc;
        chart.update();
      });
    }
  }

  try {
    var p = parent.document.documentElement;
    applyTheme(detectTheme(p));
    new MutationObserver(function() { applyTheme(detectTheme(p)); })
      .observe(p, { attributes: true, attributeFilter: ['class', 'data-theme', 'style'] });
  } catch(e) {
    var mq = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
    if (mq) { applyTheme(mq.matches); mq.addEventListener('change', function(e) { applyTheme(e.matches); }); }
  }
})();
</script>

<body>
<div style="display: flex; flex-direction: column; height: 100%; font-family: var(--font-sans);">
    <!-- Header -->
    
        <img src="https://cedia.edu.ec/wp-content/uploads/2023/01/CEDIA2023_b1-300x109.png" alt="CEDIA Logo" style="height: 40px;">
        <h1 style="color: white; margin: 0; font-size: 1.5rem; font-weight: 500;">Visualización Hola Mundo</h1>
    

    <!-- Main Content -->
    <main style="flex: 1; padding: 30px; background-color: var(--color-bg-secondary); overflow-y: auto;">
        <div style="max-width: 800px; margin: 0 auto;">
            
            <!-- Hero Card -->
            <div class="kpi-card" style="margin-bottom: 30px; text-align: center; background-color: white; border: 1px solid var(--color-border-primary);">
                <div class="kpi-value" style="color: var(--cedia-primary); font-size: 3rem;">¡Hola Mundo!</div>
                <div class="kpi-label">Bienvenido al entorno de visualización de CEDIA</div>
                <div class="kpi-accent" style="background-color: var(--cedia-accent);"></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <!-- Chart Container -->
                <div style="background: white; padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--color-border-primary);">
                    <h3 style="margin-top: 0; color: var(--cedia-primary);">Datos de Ejemplo</h3>
                    <canvas id="helloWorldChart" style="max-height: 250px;"></canvas>
                </div>

                <!-- Interaction Area -->
                <div style="background: white; padding: 20px; border-radius: var(--radius-md); border: 1px solid var(--color-border-primary); display: flex; flex-direction: column; justify-content: center; align-items: center;">
                    <p style="text-align: center; color: var(--color-text-secondary);">Esta es una demostración de los componentes base y el sistema de diseño.</p>
                    <button id="btnAction" style="background-color: var(--cedia-accent); color: var(--cedia-primary); font-weight: bold; border: none; padding: 12px 24px; border-radius: var(--radius-md); cursor: pointer; transition: transform 0.2s;">
                        ¡Haz clic aquí!
                    </button>
                    <p id="msg" style="margin-top: 15px; font-weight: 500; color: var(--cedia-blue-3); height: 20px;"></p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer style="padding: 15px; text-align: center; font-size: 0.8rem; color: var(--color-text-tertiary); background-color: var(--color-bg-tertiary);">
        Desarrollado con el Sistema de Diseño CEDIA
    </footer>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // Initialize Chart
        const ctx = document.getElementById('helloWorldChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['C', 'E', 'D', 'I', 'A'],
                datasets: [{
                    label: 'Impacto',
                    data: [65, 85, 75, 90, 95],
                    backgroundColor: [
                        'var(--cedia-blue-1)',
                        'var(--cedia-blue-2)',
                        'var(--cedia-blue-3)',
                        'var(--cedia-blue-4)',
                        'var(--cedia-accent)'
                    ],
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });

        // Interaction Logic
        const btn = document.getElementById('btnAction');
        const msg = document.getElementById('msg');
        let count = 0;

        btn.addEventListener('click', () => {
            count++;
            msg.innerText = `¡Has interactuado ${count} vez${count === 1 ? '' : 'es'}!`;
            btn.style.transform = 'scale(0.95)';
            setTimeout(() => btn.style.transform = 'scale(1)', 100);
            
            // Randomize data
            chart.data.datasets[0].data = chart.data.datasets[0].data.map(() => Math.floor(Math.random() * 100));
            chart.update();
        });
    });
</script>
<script>
/* ── Height reporting ─────────────────────────────────────────────────── */
function reportHeight() {
  var b = document.body;
  var svgOverflow = 0;
  document.querySelectorAll('svg[viewBox]').forEach(function(svg) {
    try {
      var bbox = svg.getBBox();
      var vb   = svg.viewBox.baseVal;
      if (vb && vb.width > 0 && vb.height > 0) {
        var overflow = bbox.y + bbox.height - (vb.y + vb.height);
        if (overflow > 0) {
          var scale = svg.getBoundingClientRect().width / vb.width;
          svgOverflow += Math.ceil(overflow * scale);
        }
      }
    } catch(e) {}
  });
  b.style.height = '0';
  var h = b.scrollHeight + svgOverflow;
  b.style.height = '';
  parent.postMessage({ type: 'iframe:height', height: h }, '*');
}

window.addEventListener('load',   reportHeight);
window.addEventListener('resize', reportHeight);
new ResizeObserver(reportHeight).observe(document.body);
document.addEventListener('toggle', function() { setTimeout(reportHeight, 50); }, true);

/* ── Chart.js global defaults ────────────────────────────────────────── */
window.addEventListener('load', function() {
  if (window.Chart) {
    var s         = getComputedStyle(document.documentElement);
    var textColor = s.getPropertyValue('--color-text-secondary').trim();
    var gridColor = s.getPropertyValue('--color-border-tertiary').trim();
    Chart.defaults.color       = textColor;
    Chart.defaults.borderColor = gridColor;
    Chart.defaults.font.family = '"Gotham","Montserrat","Arial",sans-serif';
    Chart.defaults.plugins.legend.labels.color   = textColor;
    Chart.defaults.plugins.legend.maxHeight      = 120;
    Chart.defaults.plugins.legend.labels.boxWidth = 12;
    Chart.defaults.plugins.legend.labels.font    = { size: 11 };

    Object.values(Chart.instances || {}).forEach(function(chart) {
      var leg = chart.options.plugins && chart.options.plugins.legend;
      if (leg) {
        leg.maxHeight = leg.maxHeight || 120;
        if (leg.labels) leg.labels.boxWidth = leg.labels.boxWidth || 12;
      }
      chart.update();
    });
  }

  /* ── SVG axis label stagger (prevents overlap on dense charts) ─────── */
  document.querySelectorAll('svg').forEach(function(svg) {
    var texts = Array.from(svg.querySelectorAll('text'));
    if (texts.length < 4) return;

    var items = [];
    texts.forEach(function(t) {
      var r = t.getBoundingClientRect();
      if (r.width < 1) return;
      items.push({ el: t, rect: r, cx: r.left + r.width / 2, cy: r.top + r.height / 2 });
    });
    if (items.length < 4) return;

    var minY = Infinity, maxY = -Infinity;
    items.forEach(function(it) {
      if (it.cy < minY) minY = it.cy;
      if (it.cy > maxY) maxY = it.cy;
    });
    if (maxY - minY < 1) return;

    var bandSize = 30, bestBand = [], bestCount = 0;
    items.forEach(function(anchor) {
      var band = items.filter(function(it) { return Math.abs(it.cy - anchor.cy) < bandSize; });
      if (band.length > bestCount) { bestCount = band.length; bestBand = band; }
    });
    if (bestBand.length < 3 || (bestBand.length === items.length && maxY - minY > 60)) return;

    var groups = [];
    bestBand.forEach(function(it) {
      for (var i = 0; i < groups.length; i++) {
        if (Math.abs(groups[i].cx - it.cx) < 15) { groups[i].items.push(it); return; }
      }
      groups.push({ cx: it.cx, items: [it] });
    });
    if (groups.length < 3) return;
    groups.sort(function(a, b) { return a.cx - b.cx; });

    var needsStagger = false;
    for (var i = 0; i < groups.length - 1; i++) {
      var maxR = 0, minL = Infinity;
      groups[i].items.forEach(function(it)     { if (it.rect.right > maxR) maxR = it.rect.right; });
      groups[i+1].items.forEach(function(it)   { if (it.rect.left  < minL) minL = it.rect.left; });
      if (maxR > minL - 2) { needsStagger = true; break; }
    }
    if (needsStagger) {
      for (var i = 1; i < groups.length; i += 2) {
        groups[i].items.forEach(function(it) {
          var cy = parseFloat(it.el.getAttribute('y') || 0);
          it.el.setAttribute('y', String(cy + 18));
        });
      }
    }
  });

  setTimeout(reportHeight, 100);
});

/* ── Chat bridge ─────────────────────────────────────────────────────── */
function sendPrompt(text) {
  try { parent.postMessage({ type: 'input:prompt:submit', text: text }, '*'); } catch(e) {}
}

function openLink(url) {
  try { parent.window.open(url, '_blank'); } catch(e) { window.open(url, '_blank'); }
}
